<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito | EL CORAZÓN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0" rel="stylesheet">
  <link href="../assets/css/theme.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-glass sticky-top">
    <div class="container-xl">
      <a class="navbar-brand headline fw-black text-flame text-uppercase" href="home.html">EL CORAZÓN</a>
      <div class="d-flex align-items-center gap-3">
        <a href="home.html" class="btn btn-ghost btn-sm rounded-3 d-flex align-items-center gap-2">
          <span class="material-symbols-outlined" style="font-size:1rem">arrow_back</span> Seguir comprando
        </a>
      </div>
    </div>
  </nav>

  <main class="py-5">
    <div class="container-xl">

      <div class="mb-4">
        <p class="text-muted-brand text-uppercase small fw-bold mb-1" style="letter-spacing:.15em">Tu selección</p>
        <h1 class="headline fw-black fs-1 mb-0">Tu Carrito</h1>
      </div>

      <!-- layout de dos columnas: col-lg-8 tabla + col-lg-4 resumen -->
      <div class="row g-4">

        <!-- columna izquierda: tabla del carrito -->
        <div class="col-lg-8">

          <!-- estado vacío: oculto cuando hay items -->
          <div id="cart-empty" class="text-center py-5">
            <span class="material-symbols-outlined mb-3" style="font-size:4rem;color:var(--color-outline-variant)">shopping_cart</span>
            <h5 class="headline fw-bold mb-2">Tu carrito está vacío</h5>
            <p class="text-muted-brand mb-4">Añade productos desde nuestro menú</p>
            <a href="home.html" class="btn btn-ember px-5 py-2 rounded-3">Ver Menú</a>
          </div>

          <!-- tabla responsive de bootstrap: table-responsive envuelve para scroll horizontal en móvil -->
          <div class="table-responsive">
            <table class="table table-brand align-middle" id="cart-table">
              <thead>
                <tr style="border-bottom:1px solid rgba(90,65,54,.3)">
                  <th class="form-label-brand py-3">Producto</th>
                  <th class="form-label-brand py-3">Cantidad</th>
                  <th class="form-label-brand py-3">Subtotal</th>
                  <th></th>
                </tr>
              </thead>
              <!-- tbody: renderizado dinámico por CartController.renderCartPage() -->
              <tbody id="cart-tbody"></tbody>
            </table>
          </div>
        </div>

        <!-- columna derecha: resumen del pedido (sticky en desktop) -->
        <div class="col-lg-4">
          <div id="cart-summary" class="card-tonal p-4 position-sticky" style="top:90px">
            <h5 class="headline fw-black mb-4">Resumen del Pedido</h5>

            <div class="d-flex justify-content-between mb-3">
              <span class="text-muted-brand">Subtotal</span>
              <span class="fw-bold" id="cart-subtotal">S/ 0.00</span>
            </div>
            <div class="d-flex justify-content-between mb-3">
              <span class="text-muted-brand">Delivery</span>
              <span class="fw-bold" id="cart-delivery">S/ 0.00</span>
            </div>

            <hr style="border-color:var(--color-outline-variant);opacity:.4">

            <div class="d-flex justify-content-between mb-4">
              <span class="fw-black">Total</span>
              <span class="headline fw-black text-flame fs-4" id="cart-total">S/ 0.00</span>
            </div>

            <a href="checkout.html" class="btn btn-ember w-100 py-3 rounded-3 mb-3">
              Confirmar Pedido <span class="material-symbols-outlined align-middle">arrow_forward</span>
            </a>
            <button class="btn btn-ghost w-100 py-2 rounded-3 small" id="clear-cart">
              Vaciar carrito
            </button>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/models/Product.js"></script>
  <script src="../assets/js/models/Cart.js"></script>
  <script src="../assets/js/views/Renderer.js"></script>
  <script src="../assets/js/controllers/CartController.js"></script>
  <script>
    CartController.init();
    CartController.renderCartPage();

    document.getElementById('clear-cart')?.addEventListener('click', () => {
      Cart.clear();
      CartController.renderCartPage();
    });
  </script>
</body>
</html>
