<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario | Admin — EL CORAZÓN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0" rel="stylesheet">
  <link href="../../assets/css/theme.css" rel="stylesheet">
</head>
<body class="d-flex">

  <aside class="admin-sidebar d-flex flex-column py-4" id="admin-sidebar"></aside>

  <div class="admin-main flex-grow-1 d-flex flex-column">

    <header class="navbar-glass d-flex justify-content-between align-items-center px-4 py-3 sticky-top" style="z-index:100">
      <button class="btn p-1 d-lg-none" id="sidebar-toggle">
        <span class="material-symbols-outlined text-primary-brand">menu</span>
      </button>
      <div class="input-group" style="max-width:380px">
        <span class="input-group-text" style="background:var(--color-surface-lowest);border:none;border-radius:2rem 0 0 2rem">
          <span class="material-symbols-outlined text-muted-brand" style="font-size:1.1rem">search</span>
        </span>
        <input type="text" id="admin-search" class="form-control form-control-dark"
               style="border-radius:0 2rem 2rem 0" placeholder="Buscar insumos...">
      </div>
      <div class="d-flex align-items-center gap-3">
        <button class="btn p-1"><span class="material-symbols-outlined text-primary-brand">notifications</span></button>
        <div class="rounded-circle overflow-hidden" style="width:36px;height:36px">
          <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuC0MraxyhscVfh4jK3KB23ZvFV1f6EeUXqD4tCQ-6O9Q68r8ioboZXXCNoskkFQR32W-dwTEmI4cpRE4aMDQARlhIq-D8Pa7vAOCVJRQ70dUEKLlbYQDrV4DuuwHLWNRM2ThsbWp-b5BoHt6GFqgfS-RY2EykdMUpHM7K59FfYaIYNABDgNgktcH0N5V2zG-OFovfEEYR9ltM4LIVoIIhWqTeFSxL-Y6A-v6QGtVigCOHX2zKqFkyB_qYPyvJEiOgJEkB0aY0ZyM_RW"
               alt="Admin" class="w-100 h-100 object-fit-cover">
        </div>
      </div>
    </header>

    <main class="p-4 p-lg-5 flex-grow-1">

      <div class="d-flex justify-content-between align-items-end mb-5 flex-wrap gap-3">
        <div>
          <p class="text-flame fw-bold small text-uppercase mb-1" style="letter-spacing:.15em">Control de Stock</p>
          <h1 class="headline fw-black fs-1 mb-0">Inventario</h1>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-ghost rounded-3 px-4 py-2 d-flex align-items-center gap-2">
            <span class="material-symbols-outlined">download</span> Exportar
          </button>
          <button class="btn btn-ember rounded-3 px-4 py-2 d-flex align-items-center gap-2"
                  data-bs-toggle="modal" data-bs-target="#addStockModal">
            <span class="material-symbols-outlined">add</span> Registrar entrada
          </button>
        </div>
      </div>

      <!-- alertas de stock bajo: alert de bootstrap con icono -->
      <div class="alert d-flex align-items-center gap-3 mb-4 rounded-3"
           style="background:rgba(255,107,0,.08);border:1px solid rgba(255,107,0,.25)">
        <span class="material-symbols-outlined text-flame">warning</span>
        <div>
          <strong class="fw-black">Stock bajo detectado</strong>
          <span class="text-muted-brand ms-2 small">3 productos necesitan reposición urgente</span>
        </div>
      </div>

      <!-- tabla de inventario -->
      <div class="card-tonal-low p-4">
        <div class="table-responsive">
          <table class="table table-brand table-hover align-middle">
            <thead>
              <tr>
                <th class="form-label-brand py-3">Producto</th>
                <th class="form-label-brand py-3">Categoría</th>
                <th class="form-label-brand py-3">Stock actual</th>
                <th class="form-label-brand py-3">Stock mínimo</th>
                <th class="form-label-brand py-3">Estado</th>
                <th class="form-label-brand py-3">Última entrada</th>
                <th class="form-label-brand py-3">Acción</th>
              </tr>
            </thead>
            <tbody id="inventory-tbody"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- modal de entrada de stock -->
  <div class="modal fade" id="addStockModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="background:var(--color-surface-high);border:none">
        <div class="modal-header" style="border-color:var(--color-outline-variant)">
          <h5 class="modal-title headline fw-black">Registrar Entrada de Stock</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <div class="mb-3">
            <label class="form-label-brand mb-2">Producto</label>
            <select class="form-select form-control-dark" id="stock-product"></select>
          </div>
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label-brand mb-2">Cantidad a ingresar</label>
              <input type="number" class="form-control form-control-dark" id="stock-qty" placeholder="0" min="1">
            </div>
            <div class="col-6">
              <label class="form-label-brand mb-2">Costo unitario (S/)</label>
              <input type="number" class="form-control form-control-dark" placeholder="0.00" step="0.01">
            </div>
          </div>
          <div class="mt-3">
            <label class="form-label-brand mb-2">Notas</label>
            <textarea class="form-control form-control-dark" rows="2" placeholder="Proveedor, lote..."></textarea>
          </div>
        </div>
        <div class="modal-footer" style="border-color:var(--color-outline-variant)">
          <button class="btn btn-ghost rounded-3" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-ember rounded-3 px-4">Registrar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/models/Product.js"></script>
  <script src="../../assets/js/views/Renderer.js"></script>
  <script src="../../assets/js/views/sidebar.partial.js"></script>
  <script src="../../assets/js/controllers/AdminController.js"></script>
  <script>
    renderAdminSidebar('inventory.html');
    AdminController.init();

    // popula el select del modal
    const products = ProductModel.getAll();
    document.getElementById('stock-product').innerHTML =
      products.map(p => `<option value="${p.id}">${p.name}</option>`).join('');

    // renderiza filas de inventario
    const MIN_STOCK = 10;
    document.getElementById('inventory-tbody').innerHTML = products.map(p => {
      const low = p.stock <= MIN_STOCK;
      const statusBadge = !p.available
        ? `<span class="badge badge-cancelled rounded-pill px-3 py-2">Agotado</span>`
        : low
          ? `<span class="badge badge-pending rounded-pill px-3 py-2">Stock bajo</span>`
          : `<span class="badge badge-delivered rounded-pill px-3 py-2">OK</span>`;

      // progress bar de bootstrap para visualizar el stock restante
      const pct   = Math.min(100, (p.stock / 50) * 100);
      const color = !p.available ? 'var(--color-error)' : low ? 'var(--color-tertiary)' : 'var(--color-primary-container)';

      return `
        <tr data-searchable>
          <td class="fw-bold">${p.name}</td>
          <td><span class="badge rounded-pill px-3 py-2" style="background:var(--color-surface-highest);color:var(--color-on-surface-variant)">${p.category}</span></td>
          <td>
            <div class="fw-black mb-1">${p.stock}</div>
            <div class="progress rounded-pill" style="height:4px;background:var(--color-surface-highest);width:80px">
              <div class="progress-bar rounded-pill" style="width:${pct}%;background:${color}"></div>
            </div>
          </td>
          <td class="text-muted-brand">${MIN_STOCK}</td>
          <td>${statusBadge}</td>
          <td class="text-muted-brand small">Hace 2 días</td>
          <td>
            <button class="btn btn-ember btn-sm rounded-3" data-bs-toggle="modal" data-bs-target="#addStockModal">
              <span class="material-symbols-outlined" style="font-size:.9rem">add</span>
            </button>
          </td>
        </tr>`;
    }).join('');
  </script>
</body>
</html>
