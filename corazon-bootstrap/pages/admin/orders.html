<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos | Admin — EL CORAZÓN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0" rel="stylesheet">
  <link href="../../assets/css/theme.css" rel="stylesheet">
</head>
<body class="d-flex">

  <aside class="admin-sidebar d-flex flex-column py-4" id="admin-sidebar"></aside>

  <div class="admin-main flex-grow-1 d-flex flex-column">

    <header class="navbar-glass d-flex justify-content-between align-items-center px-4 py-3 sticky-top" style="z-index:100">
      <button class="btn p-1 d-lg-none" id="sidebar-toggle">
        <span class="material-symbols-outlined text-primary-brand">menu</span>
      </button>
      <div class="input-group" style="max-width:380px">
        <span class="input-group-text" style="background:var(--color-surface-lowest);border:none;border-radius:2rem 0 0 2rem">
          <span class="material-symbols-outlined text-muted-brand" style="font-size:1.1rem">search</span>
        </span>
        <input type="text" id="admin-search" class="form-control form-control-dark"
               style="border-radius:0 2rem 2rem 0" placeholder="Buscar pedidos, clientes...">
      </div>
      <div class="d-flex align-items-center gap-3">
        <button class="btn p-1"><span class="material-symbols-outlined text-primary-brand">notifications</span></button>
        <div class="rounded-circle overflow-hidden" style="width:36px;height:36px">
          <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuC0MraxyhscVfh4jK3KB23ZvFV1f6EeUXqD4tCQ-6O9Q68r8ioboZXXCNoskkFQR32W-dwTEmI4cpRE4aMDQARlhIq-D8Pa7vAOCVJRQ70dUEKLlbYQDrV4DuuwHLWNRM2ThsbWp-b5BoHt6GFqgfS-RY2EykdMUpHM7K59FfYaIYNABDgNgktcH0N5V2zG-OFovfEEYR9ltM4LIVoIIhWqTeFSxL-Y6A-v6QGtVigCOHX2zKqFkyB_qYPyvJEiOgJEkB0aY0ZyM_RW"
               alt="Admin" class="w-100 h-100 object-fit-cover">
        </div>
      </div>
    </header>

    <main class="p-4 p-lg-5 flex-grow-1">

      <div class="d-flex justify-content-between align-items-end mb-5 flex-wrap gap-3">
        <div>
          <p class="text-flame fw-bold small text-uppercase mb-1" style="letter-spacing:.15em">Panel de Control</p>
          <h1 class="headline fw-black fs-1 mb-0">Gestión de Pedidos</h1>
        </div>
        <button class="btn btn-ember rounded-3 px-4 py-2 d-flex align-items-center gap-2">
          <span class="material-symbols-outlined">add</span> Nuevo Pedido
        </button>
      </div>

      <!-- chips de filtro por estado: reutiliza filter-chip de theme.css -->
      <div class="d-flex flex-wrap gap-2 mb-4" id="status-filters">
        <button class="filter-chip active" data-status="all">Todos</button>
        <button class="filter-chip" data-status="active">En camino</button>
        <button class="filter-chip" data-status="pending">En preparación</button>
        <button class="filter-chip" data-status="delivered">Entregados</button>
        <button class="filter-chip" data-status="cancelled">Cancelados</button>
      </div>

      <!-- tabla con tabla-responsive para scroll en móvil -->
      <div class="card-tonal-low p-4">
        <div class="table-responsive">
          <table class="table table-brand align-middle">
            <thead>
              <tr>
                <th class="form-label-brand py-3">#Pedido</th>
                <th class="form-label-brand py-3">Cliente</th>
                <th class="form-label-brand py-3 d-none d-lg-table-cell">Items</th>
                <th class="form-label-brand py-3">Total</th>
                <th class="form-label-brand py-3">Estado</th>
                <th class="form-label-brand py-3">Acciones</th>
              </tr>
            </thead>
            <tbody id="orders-tbody"></tbody>
          </table>
        </div>

        <!-- paginación de bootstrap -->
        <nav class="mt-4">
          <ul class="pagination pagination-sm justify-content-end mb-0">
            <li class="page-item disabled"><a class="page-link" style="background:var(--color-surface-highest);border:none;color:var(--color-on-surface)">&laquo;</a></li>
            <li class="page-item active"><a class="page-link" style="background:var(--color-primary-container);border:none">1</a></li>
            <li class="page-item"><a class="page-link" style="background:var(--color-surface-highest);border:none;color:var(--color-on-surface)">2</a></li>
            <li class="page-item"><a class="page-link" style="background:var(--color-surface-highest);border:none;color:var(--color-on-surface)">3</a></li>
            <li class="page-item"><a class="page-link" style="background:var(--color-surface-highest);border:none;color:var(--color-on-surface)">&raquo;</a></li>
          </ul>
        </nav>
      </div>
    </main>
  </div>

  <!-- modal de edición de estado del pedido -->
  <div class="modal fade" id="editOrderModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="background:var(--color-surface-high);border:none">
        <div class="modal-header" style="border-color:var(--color-outline-variant)">
          <h5 class="modal-title headline fw-black">Actualizar Pedido <span id="modal-order-id"></span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <label class="form-label-brand mb-2">Cambiar Estado</label>
          <select class="form-select form-control-dark" id="new-status">
            <option value="pending">En preparación</option>
            <option value="active">En camino</option>
            <option value="delivered">Entregado</option>
            <option value="cancelled">Cancelado</option>
          </select>
        </div>
        <div class="modal-footer" style="border-color:var(--color-outline-variant)">
          <button class="btn btn-ghost rounded-3" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-ember rounded-3" id="save-status">Guardar cambios</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/models/Order.js"></script>
  <script src="../../assets/js/views/Renderer.js"></script>
  <script src="../../assets/js/views/sidebar.partial.js"></script>
  <script src="../../assets/js/controllers/AdminController.js"></script>
  <script>
    renderAdminSidebar('orders.html');
    AdminController.init();

    function renderOrders(status = 'all') {
      const orders = status === 'all' ? OrderModel.getAll() : OrderModel.getByStatus(status);
      document.getElementById('orders-tbody').innerHTML = orders.map(o => Renderer.orderRow(o)).join('');
      // data-searchable: atributo usado por AdminController.filterTable()
      document.querySelectorAll('#orders-tbody tr').forEach(tr => tr.setAttribute('data-searchable', ''));
    }
    renderOrders();

    // filtros de estado
    document.getElementById('status-filters').addEventListener('click', e => {
      const chip = e.target.closest('.filter-chip');
      if (!chip) return;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      renderOrders(chip.dataset.status);
    });

    // abre modal de edición al hacer click en el botón editar
    document.getElementById('orders-tbody').addEventListener('click', e => {
      const btn = e.target.closest('.btn-ember');
      if (!btn) return;
      const row = btn.closest('tr');
      const id  = row.querySelector('.text-flame').textContent.replace('#', '');
      document.getElementById('modal-order-id').textContent = `#${id}`;
      new bootstrap.Modal(document.getElementById('editOrderModal')).show();
    });
  </script>
</body>
</html>
