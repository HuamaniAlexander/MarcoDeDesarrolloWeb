<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos | Admin — EL CORAZÓN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0" rel="stylesheet">
  <link href="../../assets/css/theme.css" rel="stylesheet">
</head>
<body class="d-flex">

  <aside class="admin-sidebar d-flex flex-column py-4" id="admin-sidebar"></aside>

  <div class="admin-main flex-grow-1 d-flex flex-column">

    <header class="navbar-glass d-flex justify-content-between align-items-center px-4 py-3 sticky-top" style="z-index:100">
      <button class="btn p-1 d-lg-none" id="sidebar-toggle">
        <span class="material-symbols-outlined text-primary-brand">menu</span>
      </button>
      <div class="input-group" style="max-width:380px">
        <span class="input-group-text" style="background:var(--color-surface-lowest);border:none;border-radius:2rem 0 0 2rem">
          <span class="material-symbols-outlined text-muted-brand" style="font-size:1.1rem">search</span>
        </span>
        <input type="text" id="admin-search" class="form-control form-control-dark"
               style="border-radius:0 2rem 2rem 0" placeholder="Buscar productos...">
      </div>
      <div class="d-flex align-items-center gap-3">
        <button class="btn p-1"><span class="material-symbols-outlined text-primary-brand">notifications</span></button>
        <div class="rounded-circle overflow-hidden" style="width:36px;height:36px">
          <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuC0MraxyhscVfh4jK3KB23ZvFV1f6EeUXqD4tCQ-6O9Q68r8ioboZXXCNoskkFQR32W-dwTEmI4cpRE4aMDQARlhIq-D8Pa7vAOCVJRQ70dUEKLlbYQDrV4DuuwHLWNRM2ThsbWp-b5BoHt6GFqgfS-RY2EykdMUpHM7K59FfYaIYNABDgNgktcH0N5V2zG-OFovfEEYR9ltM4LIVoIIhWqTeFSxL-Y6A-v6QGtVigCOHX2zKqFkyB_qYPyvJEiOgJEkB0aY0ZyM_RW"
               alt="Admin" class="w-100 h-100 object-fit-cover">
        </div>
      </div>
    </header>

    <main class="p-4 p-lg-5 flex-grow-1">

      <div class="d-flex justify-content-between align-items-end mb-5 flex-wrap gap-3">
        <div>
          <p class="text-flame fw-bold small text-uppercase mb-1" style="letter-spacing:.15em">Administración</p>
          <h1 class="headline fw-black fs-1 mb-0">Gestión de Productos</h1>
        </div>
        <!-- botón que abre el modal de crear producto -->
        <button class="btn btn-ember rounded-3 px-4 py-2 d-flex align-items-center gap-2"
                data-bs-toggle="modal" data-bs-target="#productModal">
          <span class="material-symbols-outlined">add</span> Nuevo Producto
        </button>
      </div>

      <!-- chips de filtro por categoría -->
      <div class="d-flex flex-wrap gap-2 mb-4" id="cat-filters">
        <button class="filter-chip active" data-filter="all">Todos</button>
        <button class="filter-chip" data-filter="pollo">Pollo</button>
        <button class="filter-chip" data-filter="combos">Combos</button>
        <button class="filter-chip" data-filter="bebidas">Bebidas</button>
        <button class="filter-chip" data-filter="brasa">Brasa</button>
      </div>

      <!-- grid de producto cards renderizado por admincontroller -->
      <div class="row g-4" id="admin-products-grid"></div>

    </main>
  </div>

  <!-- modal crear/editar producto: formulario dentro de modal de bootstrap -->
  <div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content" style="background:var(--color-surface-high);border:none">
        <div class="modal-header" style="border-color:var(--color-outline-variant)">
          <h5 class="modal-title headline fw-black">Nuevo Producto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <form id="product-form">
            <div class="row g-3">
              <div class="col-md-8">
                <label class="form-label-brand mb-2">Nombre del producto</label>
                <input type="text" class="form-control form-control-dark" placeholder="Ej. Pollo Entero a la Brasa" required>
              </div>
              <div class="col-md-4">
                <label class="form-label-brand mb-2">Categoría</label>
                <select class="form-select form-control-dark">
                  <option value="pollo">Pollo</option>
                  <option value="combos">Combos</option>
                  <option value="bebidas">Bebidas</option>
                  <option value="brasa">Brasa</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label-brand mb-2">Precio (S/)</label>
                <input type="number" class="form-control form-control-dark" placeholder="0.00" step="0.01" min="0" required>
              </div>
              <div class="col-md-6">
                <label class="form-label-brand mb-2">Stock inicial</label>
                <input type="number" class="form-control form-control-dark" placeholder="0" min="0" required>
              </div>
              <div class="col-12">
                <label class="form-label-brand mb-2">Descripción</label>
                <textarea class="form-control form-control-dark" rows="2" placeholder="Descripción breve del producto..."></textarea>
              </div>
              <div class="col-12">
                <label class="form-label-brand mb-2">URL de imagen</label>
                <input type="url" class="form-control form-control-dark" placeholder="https://...">
              </div>
              <!-- form-switch: toggle de disponibilidad (switch de bootstrap) -->
              <div class="col-12 d-flex align-items-center gap-3">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="available-switch" checked
                         style="width:2.5rem;height:1.25rem">
                  <label class="form-check-label fw-bold" for="available-switch">Disponible para pedidos</label>
                </div>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer" style="border-color:var(--color-outline-variant)">
          <button class="btn btn-ghost rounded-3" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-ember rounded-3 px-4" id="save-product">Guardar Producto</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../assets/js/models/Product.js"></script>
  <script src="../../assets/js/views/Renderer.js"></script>
  <script src="../../assets/js/views/sidebar.partial.js"></script>
  <script src="../../assets/js/controllers/AdminController.js"></script>
  <script>
    renderAdminSidebar('products.html');
    AdminController.init();
    AdminController.renderProductsGrid();

    // filtros de categoría
    document.getElementById('cat-filters').addEventListener('click', e => {
      const chip = e.target.closest('.filter-chip');
      if (!chip) return;
      document.querySelectorAll('#cat-filters .filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      // filtra las cards visibles en el grid
      const filter = chip.dataset.filter;
      document.querySelectorAll('#admin-products-grid [data-searchable]').forEach(card => {
        card.style.display = (filter === 'all' || card.textContent.toLowerCase().includes(filter)) ? '' : 'none';
      });
    });

    // guarda nuevo producto (mock: solo cierra el modal)
    document.getElementById('save-product').addEventListener('click', () => {
      bootstrap.Modal.getInstance(document.getElementById('productModal')).hide();
    });
  </script>
</body>
</html>
