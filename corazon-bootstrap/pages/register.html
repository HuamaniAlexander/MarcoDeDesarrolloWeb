<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | EL CORAZÓN — Brasa Premium</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0" rel="stylesheet">
  <link href="../assets/css/theme.css" rel="stylesheet">
</head>
<body class="min-vh-100 d-flex">

  <!-- columna izquierda: imagen (oculta en móvil) -->
  <div class="d-none d-lg-flex flex-column justify-content-end p-5 position-relative overflow-hidden"
       style="width:50%;min-height:100vh">
    <div class="position-absolute top-0 start-0 w-100 h-100"
         style="background-image:url('https://lh3.googleusercontent.com/aida-public/AB6AXuA0SW8zKeRHjBka8yQmx28RBOlvbDeecAZcMIGRAbONzLdNR_WsDaD_TognR812a29jLbOlW_dcTRHQkD91Pb09vFBZNjzaJU5zhtecUpMNSBydHoaD594ukFAw9qi_G1LonlL1bMDEZL4wXiztJkqkhTKUMN5irqKU134GSfPjUMR7ft4bu3Stpwonkm7lTCvXleIaVfsFwBsWr35YZF6Irh51FWaKCDXTW2ckC-ig_7IcCu-1UEIOd92QNoF9UD5g6zv3gpFRhyi_');
                background-size:cover;background-position:center;filter:brightness(.65);transition:transform .7s ease"></div>
    <div class="position-absolute top-0 start-0 w-100 h-100"
         style="background:linear-gradient(to top,var(--color-surface) 0%,transparent 55%)"></div>
    <div class="position-relative z-1">
      <span class="badge badge-active rounded-pill mb-3 px-3 py-2 d-inline-flex align-items-center gap-2" style="font-size:.7rem;letter-spacing:.1em">
        <span class="material-symbols-outlined" style="font-size:1rem">local_fire_department</span> Artisan Rotisserie
      </span>
      <h2 class="headline fw-black lh-1 mb-3" style="font-size:3.5rem;letter-spacing:-.03em">
        EL CORAZÓN <br><span class="text-flame">POLLERA</span>
      </h2>
      <p class="text-muted-brand fs-5">Únete a nuestra comunidad y disfruta de sabores que encienden el alma.</p>
    </div>
  </div>

  <!-- columna derecha: formulario de registro -->
  <div class="flex-grow-1 d-flex align-items-center justify-content-center p-4 p-lg-5"
       style="background:var(--color-surface)">
    <div style="max-width:480px" class="w-100">

      <h1 class="headline fw-black fs-1 mb-1">Crear Cuenta</h1>
      <p class="text-muted-brand mb-5">Completa tus datos para empezar el festín.</p>

      <form id="register-form" novalidate>

        <div class="mb-4">
          <label class="form-label-brand mb-2" for="full_name">Nombre Completo</label>
          <input type="text" id="full_name" name="full_name"
                 class="form-control form-control-dark" placeholder="Ej. Juan Pérez" required>
        </div>

        <div class="mb-4">
          <label class="form-label-brand mb-2" for="email">Correo Electrónico</label>
          <input type="email" id="email" name="email"
                 class="form-control form-control-dark" placeholder="hola@ejemplo.com" required>
        </div>

        <div class="mb-4">
          <label class="form-label-brand mb-2" for="phone">Teléfono</label>
          <input type="tel" id="phone" name="phone"
                 class="form-control form-control-dark" placeholder="+51 999 999 999">
        </div>

        <!-- row de bootstrap para dos columnas en el mismo nivel -->
        <div class="row g-3 mb-4">
          <div class="col-md-6">
            <label class="form-label-brand mb-2" for="password">Contraseña</label>
            <input type="password" id="password" name="password"
                   class="form-control form-control-dark" placeholder="••••••••" required>
          </div>
          <div class="col-md-6">
            <label class="form-label-brand mb-2" for="confirm_password">Confirmar Contraseña</label>
            <input type="password" id="confirm_password" name="confirm_password"
                   class="form-control form-control-dark" placeholder="••••••••" required>
          </div>
        </div>

        <!-- checkbox usando form-check de bootstrap -->
        <div class="form-check mb-4">
          <input type="checkbox" id="terms" class="form-check-input" required
                 style="background-color:var(--color-surface-highest);border-color:var(--color-outline-variant)">
          <label class="form-check-label small text-muted-brand" for="terms">
            Acepto los <a href="#" class="text-primary-brand">Términos de Servicio</a> y la
            <a href="#" class="text-primary-brand">Política de Privacidad</a>
          </label>
        </div>

        <button type="submit" class="btn btn-ember w-100 py-3 rounded-3 fs-6 text-uppercase fw-black" style="letter-spacing:.08em">
          Crear mi cuenta
        </button>
      </form>

      <hr class="my-4" style="border-color:var(--color-outline-variant);opacity:.3">
      <p class="text-center text-muted-brand">
        ¿Ya tienes cuenta?
        <a href="login.html" class="text-flame fw-black ms-1">Iniciar Sesión</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/controllers/AuthController.js"></script>
  <script>AuthController.init();</script>
</body>
</html>
